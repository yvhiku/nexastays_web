<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#FDFBFC" />
    <title>No internet · Nexa Stays</title>
    <style>
      :root {
        --bg: #fdfbfc;
        --ink: #1a1118;
        --muted: #6b5460;
        --primary: #e8507a;
        --line: #ede0e5;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100dvh;
        font-family: "DM Sans", system-ui, sans-serif;
        background: linear-gradient(160deg, #fdfbfc 0%, #f8f2f5 55%, #fdf0f3 100%);
        color: var(--ink);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        padding-bottom: max(24px, env(safe-area-inset-bottom));
      }
      .card {
        max-width: 420px;
        width: 100%;
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 22px;
        padding: 28px 24px;
        box-shadow: 0 4px 20px rgba(26, 17, 24, 0.07);
        text-align: center;
      }
      .logo {
        width: 64px;
        height: 64px;
        margin: 0 auto 16px;
        border-radius: 16px;
        border: 2px solid #f8e8ed;
        object-fit: cover;
        display: block;
      }
      h1 { font-size: 1.35rem; margin: 0 0 8px; }
      p { margin: 0 0 10px; color: var(--muted); font-size: 0.95rem; line-height: 1.5; }
      .actions { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
      button.btn, a.btn {
        display: block;
        width: 100%;
        text-decoration: none;
        border: none;
        cursor: pointer;
        border-radius: 14px;
        padding: 14px 16px;
        font-weight: 600;
        font-size: 0.95rem;
        font-family: inherit;
      }
      .primary { background: var(--primary); color: #fff; }
      .ghost { background: #f8f2f5; color: var(--ink); }
      #recent { text-align: left; margin-top: 18px; display: none; }
      #recent h2 {
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        margin: 0 0 8px;
      }
      #recent a {
        display: block;
        padding: 12px 0;
        border-top: 1px solid var(--line);
        color: var(--ink);
        text-decoration: none;
        font-size: 0.95rem;
        font-weight: 500;
      }
      #recent a::before { content: "• "; color: var(--primary); }
    </style>
  </head>
  <body>
    <main class="card">
      <img class="logo" src="/images/nexastays.png" alt="Nexa Stays" width="64" height="64" />
      <h1>No internet connection</h1>
      <p>You can still open stays you viewed recently.</p>
      <div class="actions">
        <button type="button" class="btn primary" id="retry">Retry</button>
        <button type="button" class="btn ghost" id="browse-recent" style="display:none">
          Browse recently viewed
        </button>
      </div>
      <div id="recent">
        <h2>Recently viewed</h2>
        <div id="recent-list"></div>
      </div>
    </main>
    <script>
      (function () {
        document.getElementById("retry").addEventListener("click", function () {
          location.reload();
        });
        try {
          var raw = localStorage.getItem("nexa-recently-viewed");
          var items = raw ? JSON.parse(raw) : [];
          if (!Array.isArray(items) || !items.length) return;
          var wrap = document.getElementById("recent");
          var list = document.getElementById("recent-list");
          var browse = document.getElementById("browse-recent");
          wrap.style.display = "block";
          browse.style.display = "block";
          items.slice(0, 8).forEach(function (item) {
            if (!item || !item.id) return;
            var a = document.createElement("a");
            var locale = (document.cookie.match(/(?:^|; )nexa_locale=([^;]*)/) || [])[1] || "en";
            a.href = "/" + locale + "/listings/" + item.id;
            a.textContent = item.title || "Stay";
            if (item.city) a.textContent += " · " + item.city;
            list.appendChild(a);
          });
          browse.addEventListener("click", function () {
            wrap.scrollIntoView({ behavior: "smooth", block: "start" });
          });
        } catch (e) {}
      })();
    </script>
  </body>
</html>
